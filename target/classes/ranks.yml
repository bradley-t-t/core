# ==============================
# Core Plugin Rank Display Configuration
# This file controls the cosmetic display and weight of each rank.
# Permission logic is defined in the commands themselves.
# Weight determines the rank hierarchy (higher = more privileged).
# ==============================

ranks:
  member:
    weight: 0
    prefix: "&7[Member]"
    chat-color: "&f"
  diamond:
    weight: 100
    prefix: "&b[Diamond]"
    chat-color: "&b"
  moderator:
    weight: 200
    prefix: "&9[Mod]"
    chat-color: "&9"
  operator:
    weight: 300
    prefix: "&c[OP]"
    chat-color: "&c"
