name: Build & Deploy to Server

on:
  push:
    branches: [master, main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        run: mvn clean package -q

      - name: Verify JAR exists
        run: ls -la ./target/Core.jar

      - name: Upload to Server via SFTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          mkdir -p ~/.lftp
          echo "set sftp:auto-confirm yes" > ~/.lftp/rc
          echo "set net:max-retries 3" >> ~/.lftp/rc
          lftp -u "${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }}" \
            -p ${{ secrets.SFTP_PORT }} \
            sftp://${{ secrets.SFTP_HOST }} \
            -e "put ./target/Core.jar -o '/1. Core Minecraft/plugins/Core.jar'; bye"
