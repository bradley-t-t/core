# ==============================
# Core Plugin Configuration
# ==============================

# How often (in minutes) player data is auto-saved to disk.
# Protects against data loss from crashes. Set to 0 to disable.
auto-save-interval-minutes: 5

# Discord invite link shown by /discord
discord-url: "https://discord.gg/g5AkS6Gpm4"

# Server list MOTD shown in the multiplayer menu.
# Supports & color codes. Use \n for line breaks.
# Set to "" to use the default server.properties MOTD.
motd: "&f&lCore Survival\n&7A Custom Coded Survival Experience"

# World border settings.
# Applies to the overworld on startup. Center defaults to world spawn.
world-border:
  enabled: true
  radius: 5000
  # Buffer in blocks to keep random teleports away from the edge.
  wild-buffer: 200

# Wild / random teleport settings.
# Used for first-join placement and the /wild command.
wild-teleport:
  # Cooldown in seconds between /wild uses (0 = no cooldown).
  cooldown-seconds: 300
  # Maximum attempts to find a safe location before giving up.
  max-attempts: 20
  # Minimum distance from world center (0,0) to avoid spawning at origin.
  min-distance: 200

# Fake player system. Simulates player activity on the server.
# Managed via /fakeplayers command. Player names stored in fakeplayers.yml.
fake-players:
  enabled: false
  # Range of fake players to keep "online" at any time.
  min-online: 10
  max-online: 30
  # How long each fake player stays "online" (in minutes).
  # Most play 15min-8hr, occasionally up to 12hr.
  min-session-minutes: 15
  max-session-minutes: 480
  # How often (in seconds) the system considers joining/leaving a fake player.
  cycle-interval-seconds: 60
  # How many times each bot votes per day (per vote site link).
  # Bots vote in clusters of 2-3 throughout the day to look natural.
  vote-link-count: 1
  # Grok API key for AI-generated chat. Leave empty to use static messages.
  # Get a key at https://console.x.ai/
  grok-api-key: ""

# Land claim system
claims:
  enabled: true
  wand-material: GOLDEN_SHOVEL
  min-claim-size: 5
  max-area:
    MEMBER: 2500
    DIAMOND: 10000
    MODERATOR: 40000
    OPERATOR: -1
  max-claims:
    MEMBER: 2
    DIAMOND: 5
    MODERATOR: 10
    OPERATOR: -1
  # Maximum TOTAL combined area across all claims per rank. -1 = unlimited.
  # MEMBER: 1000x1000 = 1,000,000. DIAMOND: 10000x10000 = 100,000,000.
  max-total-area:
    MEMBER: 1000000
    DIAMOND: 100000000
    MODERATOR: -1
    OPERATOR: -1
  prevent-mob-spawning: false
  particle-render-distance: 64

# Tree felling system - realistic tree chopping
tree-felling:
  enabled: true
  # Max logs a tree can have before it's considered a build (not a tree)
  max-logs: 128
  # Minimum leaf-to-log ratio for natural tree validation.
  # Natural trees have ~2-4x leaves per log. Builds have few or none.
  min-leaf-ratio: 1.0
  # Ticks between each layer breaking (2 ticks = 0.1 seconds)
  ticks-per-layer: 2

# Vote system
voting:
  enabled: true
  port: 27917
  # Vote links shown to players with /vote. Add as many as needed.
  vote-links:
    - name: "MinecraftServers.org"
      url: "https://example.com/vote1"
    - name: "PlanetMinecraft"
      url: "https://example.com/vote2"
  # Rewards per vote
  rewards:
    xp-levels: 5
    items:
      - material: DIAMOND
        amount: 1
